services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ting
      POSTGRES_PASSWORD: ting
      POSTGRES_DB: ting
    ports:
      - "5432:5432"
    volumes:
      - ting_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ting"]
      interval: 5s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - ting_valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  ting_pg_data:
  ting_valkey_data:
