{% extends "base.html" %}
{% block title %}{{ status_code }} {{ status_label }}{% endblock %}
{% block hero %}
<section class="error-page">
  <div class="error-card">
    <h1>{{ status_label }}</h1>
    <p>{{ message }}</p>
    <p class="muted" style="margin-top: 1.5rem;"><a href="/">← Back to start</a></p>
    <p class="muted error-code">Error {{ status_code }}</p>
  </div>
</section>
{% endblock %}
{% block main %}{% endblock %}
